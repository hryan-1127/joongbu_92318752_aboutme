        <dt>설명할 대상 : ex)사과</dt>
        <dd>특징: 사과나무(Malus domestica)의 열매로, 중앙아시아 톈산산맥이 원산지입니다<br>
            어원: 모래 사(沙)와 과일 과(果)를 쓰며, 표면이 거칠고 사각사각한 식감 때문에 붙여진 이름입니다<br>
            상징: 신화와 문학에서 금단의 열매나 유혹, 지혜를 상징하기도 합니다.</dd>
